name: Trigger Manpage Generation

on:
  pull_request:
    types: [closed]
    branches:
      - main   # ✅ only PRs merged into main
  push:
    branches:
      - main   # ✅ only pushes to main

jobs:
  trigger:
    # ✅ Only run when:
    # - PR is merged into main OR
    # - direct push to main
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get changed MD files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            zoau-core-manpage/**/*.md

      - name: Set payload values
        id: payload
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "pr_title=${{ github.event.pull_request.title }}" >> $GITHUB_OUTPUT
          else
            echo "pr_number=test-${{ github.run_id }}" >> $GITHUB_OUTPUT
            echo "pr_title=TEST: md to manpage run from main branch" >> $GITHUB_OUTPUT
          fi

      - name: Trigger mvsutil-deploy workflow
        run: |
          curl -X POST https://api.github.com/repos/<YOUR-USERNAME>/mvsutil-deploy/dispatches \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${{ secrets.ArtifactoryAccessToken }}" \
          -d '{
            "event_type": "generate-manpages",
            "client_payload": {
              "pr_number": "${{ steps.payload.outputs.pr_number }}",
              "pr_title": "${{ steps.payload.outputs.pr_title }}",
              "changed_files": "${{ steps.files.outputs.all_changed_files }}"
            }
          }'