name: Generate Manpages and Raise PR

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'zoau-core-manpage/**/*.md'

  push:
    branches:
      - main
    paths:
      - 'zoau-core-manpage/**/*.md'

jobs:
  generate-manpages:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout mvsutil-ua
        uses: actions/checkout@v4

      - name: Checkout mvsutil
        uses: actions/checkout@v4
        with:
          repository: mdfazil20/mvsutil-test
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: mvsutil
      - name: Debug workspace after checkout
        run: |
          echo "==== CURRENT DIR ===="
          pwd

          echo "==== ROOT CONTENT ===="
          ls -la

          echo "==== MVSUTIL FOLDER ===="
          ls -la mvsutil

          echo "==== FULL TREE (2 levels) ===="
          find . -maxdepth 2 -type d

      - name: Get changed MD files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            zoau-core-manpage/**/*.md

      - name: Debug changed files
        run: |
          echo "Changed files:"
          echo "${{ steps.files.outputs.all_changed_files }}"

      - name: Convert changed MD files to manpages
        run: |
          TEMP_DIR="temp_md"
          mkdir -p $TEMP_DIR

          echo "Preparing temp directory..."

          # Copy only changed MD files
          for file in ${{ steps.files.outputs.all_changed_files }}; do
            if [[ "$file" == zoau-core-manpage/*.md ]]; then
              echo "Copying $file"
              cp "$file" "$TEMP_DIR/"
            fi
          done

          echo "Files in temp dir:"
          ls -l $TEMP_DIR

          # Run script with folder input
          python3 scripts/md_to_manpage.py \
            -i $TEMP_DIR \
            -o mvsutil/mvsutil-test/docs/C/cat1

          # Cleanup
          rm -rf $TEMP_DIR

      - name: Commit & Push changes
        run: |
          cd mvsutil

          BRANCH_NAME="auto-manpage-${{ github.run_id }}"

          git checkout -b $BRANCH_NAME

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs/C/cat1
          git commit -m "${{ github.event.pull_request.title || 'Auto manpage generation' }}" || echo "No changes"

          git push origin $BRANCH_NAME

      - name: Create PR in mvsutil
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: mvsutil
          branch: auto-manpage-${{ github.run_id }}
          title: ${{ github.event.pull_request.title || 'Auto manpage generation' }}
          body: "Auto-generated manpages from mvsutil-ua"
          base: main