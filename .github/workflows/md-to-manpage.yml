name: Generate Manpages and Raise PR

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'zoau-core-manpage/**/*.md'

  push:
    branches:
      - main
    paths:
      - 'zoau-core-manpage/**/*.md'

jobs:
  generate-manpages:
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'push')

    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout source repo (mvsutil-ua)
      # =========================
      - name: Checkout mvsutil-ua
        uses: actions/checkout@v4

      # =========================
      # Checkout target repo (mvsutil)
      # =========================
      - name: Checkout mvsutil
        uses: actions/checkout@v4
        with:
          repository: mdfazil20/mvsutil-test
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: mvsutil

      # =========================
      # Debug workspace (optional)
      # =========================
      - name: Debug workspace
        run: |
          echo "==== CURRENT DIR ===="
          pwd

          echo "==== ROOT CONTENT ===="
          ls -la

          echo "==== MVSUTIL FOLDER ===="
          ls -la mvsutil

      # =========================
      # Get changed markdown files
      # =========================
      - name: Get changed MD files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            zoau-core-manpage/**/*.md

      - name: Debug changed files
        run: |
          echo "Changed files:"
          echo "${{ steps.files.outputs.all_changed_files }}"

      # =========================
      # Create branch FIRST
      # =========================
      - name: Prepare branch in mvsutil
        run: |
          cd mvsutil

          BRANCH_NAME="auto-manpage-${{ github.run_id }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

          git checkout -b $BRANCH_NAME

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # =========================
      # Convert MD → manpages via temp dirs
      # =========================
      - name: Convert changed MD files to manpages
        run: |
          TEMP_MD="temp_md"
          TEMP_OUT="temp_out"

          mkdir -p $TEMP_MD
          mkdir -p $TEMP_OUT

          echo "==== Preparing temp input ===="

          echo "${{ steps.files.outputs.all_changed_files }}" | tr ' ' '\n' > files.txt
          cat files.txt

          # Copy only changed MD files
          while read file; do
            if [[ "$file" == zoau-core-manpage/*.md ]]; then
              echo "Copying $file"
              cp "$file" "$TEMP_MD/"
            fi
          done < files.txt

          echo "==== Temp MD files ===="
          ls -l $TEMP_MD || true

          # Exit if nothing to process
          if [ -z "$(ls -A $TEMP_MD 2>/dev/null)" ]; then
            echo "No files to process. Exiting."
            exit 0
          fi

          echo "==== Running conversion ===="

          python3 scripts/md_to_manpage.py \
            -i $TEMP_MD \
            -o $TEMP_OUT

          echo "==== Generated files ===="
          ls -l $TEMP_OUT

          echo "==== Copying to target repo ===="

          cp -r $TEMP_OUT/* mvsutil/docs/C/cat1/

          echo "==== Final target contents ===="
          ls -l mvsutil/docs/C/cat1

          # Cleanup
          rm -rf $TEMP_MD $TEMP_OUT files.txt

      # =========================
      # Commit & Push
      # =========================
      - name: Commit & Push changes
        run: |
          cd mvsutil

          echo "==== BEFORE ADD ===="
          git status

          git add docs/C/cat1

          echo "==== AFTER ADD ===="
          git status

          echo "==== STAGED DIFF ===="
          git diff --cached || true

          # Skip if no changes
          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping push."
            exit 0
          fi

          git commit -m "${{ github.event.pull_request.title || 'Auto manpage generation' }}"

          echo "==== AFTER COMMIT ===="
          git status

          git push origin $BRANCH_NAME

      # =========================
      # Create Pull Request
      # =========================
      - name: Create PR in mvsutil
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: mvsutil
          branch: ${{ env.BRANCH_NAME }}
          title: ${{ github.event.pull_request.title || 'Auto manpage generation' }}
          body: "Auto-generated manpages from mvsutil-ua"
          base: main