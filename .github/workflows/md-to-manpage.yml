name: Generate Manpages and Raise PR

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'zoau-core-manpage/**/*.md'

env:
  TARGET_REPO: mdfazil20/mvsutil-test
  TARGET_PATH: mvsutil
  TARGET_BRANCH_BASE: main
  OUTPUT_DIR: docs/C/cat1
  SOURCE_MD_PATH: zoau-core-manpage/**/*.md
  GIT_USER_NAME: github-actions
  GIT_USER_EMAIL: github-actions@github.com
  BRANCH_PREFIX: auto-manpage-

jobs:
  generate-manpages:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: ${{ env.TARGET_PATH }}

      # 🔁 Replaces tj-actions/changed-files
      - name: Get changed MD files
        id: files
        run: |
          git fetch origin ${{ github.event.pull_request.base.ref }}

          git diff --name-only \
            origin/${{ github.event.pull_request.base.ref }} \
            ${{ github.sha }} \
            | grep '^zoau-core-manpage/.*\.md$' > files.txt || true

      - name: Convert MD to manpages
        run: |
          TEMP_MD="temp_md"
          TEMP_OUT="temp_out"

          mkdir -p "$TEMP_MD" "$TEMP_OUT"

          if [ ! -s files.txt ]; then
            echo "No files to process. Exiting."
            exit 0
          fi

          while read file; do
            if [[ "$file" == zoau-core-manpage/*.md ]]; then
              cp "$file" "$TEMP_MD/"
            fi
          done < files.txt

          if [ -z "$(ls -A $TEMP_MD 2>/dev/null)" ]; then
            echo "No files to process. Exiting."
            exit 0
          fi

          python3 scripts/md_to_manpage.py \
            -i "$TEMP_MD" \
            -o "$TEMP_OUT"

          cp -r "$TEMP_OUT"/* "${{ env.TARGET_PATH }}/${{ env.OUTPUT_DIR }}/"

          rm -rf "$TEMP_MD" "$TEMP_OUT" files.txt

      # 🔁 Replaces peter-evans/create-pull-request
      - name: Commit and Push changes
        run: |
          cd ${{ env.TARGET_PATH }}

          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"

          BRANCH_NAME=${{ env.BRANCH_PREFIX }}${{ github.run_id }}

          git checkout -b $BRANCH_NAME
          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto manpage generation"
          git push origin $BRANCH_NAME

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create Pull Request
        run: |
          cd ${{ env.TARGET_PATH }}

          gh pr create \
            --title "Auto manpage generation" \
            --body "Auto-generated manpages from mvsutil-ua" \
            --base ${{ env.TARGET_BRANCH_BASE }} \
            --head $BRANCH_NAME
        env:
          GITHUB_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}