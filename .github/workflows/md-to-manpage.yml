name: Generate Manpages and Raise PR

on:
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - 'zoau-core-manpage/**/*.md'

env:
  TARGET_REPO: mdfazil20/mvsutil-test
  TARGET_PATH: mvsutil
  TARGET_BRANCH_BASE: main
  OUTPUT_DIR: docs/C/cat1
  SOURCE_MD_PATH: zoau-core-manpage/**/*.md
  GIT_USER_NAME: github-actions
  GIT_USER_EMAIL: github-actions@github.com
  BRANCH_PREFIX: auto-manpage-

jobs:
  generate-manpages:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: ${{ env.TARGET_PATH }}

      - name: Get changed MD files
        id: files
        uses: tj-actions/changed-files@v44
        with:
          files: ${{ env.SOURCE_MD_PATH }}

      - name: Convert MD to manpages
        run: |
          TEMP_MD="temp_md"
          TEMP_OUT="temp_out"

          mkdir -p "$TEMP_MD" "$TEMP_OUT"

          echo "${{ steps.files.outputs.all_changed_files }}" | tr ' ' '\n' > files.txt

          while read file; do
            if [[ "$file" == zoau-core-manpage/*.md ]]; then
              cp "$file" "$TEMP_MD/"
            fi
          done < files.txt

          if [ -z "$(ls -A $TEMP_MD 2>/dev/null)" ]; then
            echo "No files to process. Exiting."
            exit 0
          fi

          python3 scripts/md_to_manpage.py \
            -i "$TEMP_MD" \
            -o "$TEMP_OUT"

          cp -r "$TEMP_OUT"/* "${{ env.TARGET_PATH }}/${{ env.OUTPUT_DIR }}/"

          rm -rf "$TEMP_MD" "$TEMP_OUT" files.txt

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          path: ${{ env.TARGET_PATH }}
          commit-message: "Auto manpage generation"
          branch: ${{ env.BRANCH_PREFIX }}${{ github.run_id }}
          title: "Auto manpage generation"
          body: "Auto-generated manpages from mvsutil-ua"
          base: ${{ env.TARGET_BRANCH_BASE }}